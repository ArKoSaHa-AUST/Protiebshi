services:
  mysql:
    image: mysql:8
    container_name: protibeshi_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: protibeshi_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: protibeshi_backend_image
    build:
      context: ./server
    container_name: protibeshi_backend
    restart: unless-stopped
    working_dir: /var/www
    command: sh /var/www/docker/entrypoint.sh
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: protibeshi_db
      DB_USERNAME: root
      DB_PASSWORD: root
      VITE_GEMINI_API_KEY: ${VITE_GEMINI_API_KEY:-}
      VITE_GROQ_CLOUD_API_KEY: ${VITE_GROQ_CLOUD_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./server:/var/www
    depends_on:
      mysql:
        condition: service_healthy

  websocket:
    image: protibeshi_backend_image
    container_name: protibeshi_websocket
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan websockets:serve --host=0.0.0.0 --port=6001
    ports:
      - "6001:6001"
    volumes:
      - ./server:/var/www
    depends_on:
      - backend

  queue:
    image: protibeshi_backend_image
    container_name: protibeshi_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --tries=3 --timeout=90
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: protibeshi_db
      DB_USERNAME: root
      DB_PASSWORD: root
      VITE_GEMINI_API_KEY: ${VITE_GEMINI_API_KEY:-}
      VITE_GROQ_CLOUD_API_KEY: ${VITE_GROQ_CLOUD_API_KEY:-}
    volumes:
      - ./server:/var/www
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ./client
      target: dev
    container_name: protibeshi_frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm run dev -- --host"
    environment:
      VITE_GROQ_CLOUD_API_KEY: ${VITE_GROQ_CLOUD_API_KEY:-}
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: protibeshi_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./client/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
      - websocket

volumes:
  mysql_data:
  frontend_node_modules:
